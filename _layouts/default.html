<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — SLASHED{% else %}SLASHED{% endif %}</title>
  <link rel="stylesheet" href="/dist/slashed.optimal.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { max-width: 60rem; margin: 0 auto; padding: 1.5rem 2rem 5rem; font-family: system-ui, sans-serif; line-height: 1.6; color: #1a1a1a; }
    a { color: #4f46e5; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { font-size: 0.875em; background: #f0f0f0; padding: 0.1em 0.35em; border-radius: 3px; }
    pre code { font-size: inherit; background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    td, th { padding: 0.45rem 0.85rem; border: 1px solid #e0e0e0; text-align: left; }
    th { background: #f8f8f8; font-weight: 600; }
    nav { display: flex; align-items: center; gap: 1.25rem; padding: 0.85rem 0 1.5rem; border-bottom: 1px solid #e5e5e5; margin-bottom: 2.5rem; flex-wrap: wrap; }
    nav a { text-decoration: none; font-weight: 500; color: #444; font-size: 0.9rem; }
    nav a:first-child { font-weight: 800; color: #0f0f0f; font-size: 1.05rem; margin-right: 0.5rem; letter-spacing: -0.02em; }
    nav a:hover { color: #4f46e5; }
    nav .nav-cta { background: #4f46e5; color: #fff !important; padding: 0.3rem 0.85rem; border-radius: 6px; font-size: 0.83rem; font-weight: 600; margin-left: auto; }
    nav .nav-cta:hover { background: #4338ca; }
  </style>
</head>
<body>
  <nav>
    <a href="/">SLASHED</a>
    <a href="/docs/architecture">Docs</a>
    <a href="/docs/tokens">Tokens</a>
    <a href="/docs/test-coverage.html">Coverage</a>
    <a href="https://github.com/codeslash-dev/SLASHED">GitHub</a>
    <a href="/configurator/" class="nav-cta">Configurator →</a>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
