<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — SLASHED{% else %}SLASHED{% endif %}</title>
  <link rel="stylesheet" href="/dist/slashed.optimal.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { max-width: 56rem; margin: 0 auto; padding: 1.5rem 2rem 4rem; font-family: system-ui, sans-serif; line-height: 1.6; color: #1a1a1a; }
    a { color: #0066cc; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    code { font-size: 0.875em; }
    pre code { font-size: inherit; }
    table { border-collapse: collapse; width: 100%; }
    td, th { padding: 0.4rem 0.75rem; border: 1px solid #ddd; text-align: left; }
    nav { display: flex; gap: 1.25rem; padding: 0.75rem 0 1.5rem; border-bottom: 1px solid #e5e5e5; margin-bottom: 2rem; flex-wrap: wrap; }
    nav a { text-decoration: none; font-weight: 500; color: #333; }
    nav a:first-child { font-weight: 700; color: #000; margin-right: 0.5rem; }
    nav a:hover { color: #0066cc; }
  </style>
</head>
<body>
  <nav>
    <a href="/">SLASHED</a>
    <a href="/configurator/">Configurator</a>
    <a href="/docs/demo.html">Demo</a>
    <a href="/docs/test-coverage.html">Coverage</a>
    <a href="https://github.com/codeslash-dev/SLASHED">GitHub</a>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
