<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SLASHED a11y fixture</title>
  <!-- Built bundle: real framework defaults (base + forms + layout + states). -->
  <link rel="stylesheet" href="../dist/slashed.optimal.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header>
    <nav aria-label="Primary">
      <a href="#main">Home</a>
      <a href="#forms" class="sf-is-current" aria-current="page">Forms</a>
    </nav>
  </header>

  <main id="main" class="sf-container">
    <section class="sf-section sf-prose">
      <h1>Accessible defaults</h1>
      <p>Body text on the page background, with a <a href="https://example.com">link</a>,
        <strong>strong</strong> and <em>emphasis</em>. Inline <code>code</code> too.</p>
      <h2>A subheading</h2>
      <p>Secondary paragraph to exercise heading order and reading contrast.</p>
      <blockquote>A quote inside prose.</blockquote>
    </section>

    <section id="forms" class="sf-section">
      <h2>Form controls</h2>
      <form class="sf-stack">
        <div>
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email">
        </div>
        <div>
          <label for="country">Country</label>
          <select id="country" name="country">
            <option>United Kingdom</option>
            <option>Poland</option>
          </select>
        </div>
        <div>
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio"></textarea>
        </div>
        <div>
          <label for="vol">Volume</label>
          <input id="vol" name="vol" type="range" min="0" max="10">
        </div>
        <fieldset>
          <legend>Contact preference</legend>
          <label><input type="radio" name="pref" value="email" checked> Email</label>
          <label><input type="radio" name="pref" value="phone"> Phone</label>
          <label><input type="checkbox" name="news"> Subscribe to news</label>
        </fieldset>
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
</body>
</html>
