name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk -v target="$VERSION" '
            $1 == "##" {
              heading = $2
              gsub(/^\[/, "", heading)
              gsub(/\]$/, "", heading)
              if (found) exit
              if (heading == target) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "Warning: no CHANGELOG section found for v$VERSION" >&2
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/slashed.essential.css
            dist/slashed.essential.min.css
            dist/slashed.essential.min.css.map
            dist/slashed.essential.flat.css
            dist/slashed.essential.flat.min.css
            dist/slashed.essential.flat.min.css.map
            dist/slashed.optimal.css
            dist/slashed.optimal.min.css
            dist/slashed.optimal.min.css.map
            dist/slashed.optimal.flat.css
            dist/slashed.optimal.flat.min.css
            dist/slashed.optimal.flat.min.css.map
            dist/slashed.optimal-components.css
            dist/slashed.optimal-components.min.css
            dist/slashed.optimal-components.min.css.map
            dist/slashed.optimal-components.flat.css
            dist/slashed.optimal-components.flat.min.css
            dist/slashed.optimal-components.flat.min.css.map
            dist/slashed.optimal-utilities.css
            dist/slashed.optimal-utilities.min.css
            dist/slashed.optimal-utilities.min.css.map
            dist/slashed.optimal-utilities.flat.css
            dist/slashed.optimal-utilities.flat.min.css
            dist/slashed.optimal-utilities.flat.min.css.map
            dist/slashed.full.css
            dist/slashed.full.min.css
            dist/slashed.full.min.css.map
            dist/slashed.full.flat.css
            dist/slashed.full.flat.min.css
            dist/slashed.full.flat.min.css.map
          fail_on_unmatched_files: true
