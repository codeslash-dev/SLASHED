name: Notify slashed-plugins to sync configurator

# Fires when configurator source or the built API index changes on main.
# Sends a repository_dispatch event to slashed-plugins so it can re-sync
# the shared configurator source and rebuild the WP admin-app bundle.
on:
  push:
    branches: [main]
    paths:
      - 'configurator/src/**'
      - 'docs/api-index.json'

jobs:
  notify:
    name: Dispatch sync event to slashed-plugins
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        uses: actions/github-script@v7
        with:
          # PLUGINS_REPO_TOKEN must have repo scope on codeslash-dev/slashed-plugins.
          # Create it in the slashed repo secrets:
          #   Settings > Secrets > Actions > PLUGINS_REPO_TOKEN
          github-token: ${{ secrets.PLUGINS_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'codeslash-dev',
              repo: 'slashed-plugins',
              event_type: 'configurator-updated',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                actor: context.actor,
              },
            });
            console.log('Dispatched configurator-updated to slashed-plugins');
